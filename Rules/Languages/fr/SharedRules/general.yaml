- name: log
  tag: mi
  match: ".='log' or .='ln'"
  replace:
  - bookmark: "@id"
  - test:
    - if: "$Verbosity!='Terse'"
      then: [t: "le"]
  - test:
    - if: ".= 'log'"
      then: [t: "log"]
    - else_if: "$Verbosity='Terse'"
      then: [spell: "'ln'"]
      else: [t: "logarithme naturel"]
