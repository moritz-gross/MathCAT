---

- name: scalar-determinant
  tag: determinant
  match: "count(*)=1 and not(*[1][self::m:mtr])"
  replace:
  - test:
      if: "$Verbosity='Verbose'"
      then:
      - t: "le"
  - t: "déterminant"
  - test:
      if: "$Verbosity!='Terse'"
      then:
      - t: "de"
  - x: "*[1]"
  - test:
      if: "not(IsNode(*[1], 'simple')) and $Impairment = 'Blindness'"
      then: [t: "fin du déterminant"]

- name: subscripted-norm
  tag: subscripted-norm
  match: "count(*)=2"
  replace:
  - test:
      if: "$Verbosity='Verbose'"
      then:
      - t: "la"
  - x: "*[2]"
  - t: "norme"
  - test:
      if: "$Verbosity!='Terse'"
      then:
      - t: "de"
  - x: "*[1]"
